{% extends "bookstore/base.html" %}

{% block title %}我的 - MyBookwise{% endblock %}

{% block content %}
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>

<div class="page-content animate-fade-in">
    <div class="page-header">
        <div class="page-header-main">
            <h1 class="page-title">
                <span class="material-symbols-outlined page-title-icon" aria-hidden="true">person</span>
                我的
            </h1>
        </div>
    </div>

    <div class="card">
        <div class="card-body" style="padding: 0;">
            <nav class="my-menu" aria-label="我的">
                <a href="{% url 'bookstore:account_profile' %}" class="my-menu-item">
                    <span class="material-symbols-outlined my-menu-icon" aria-hidden="true">badge</span>
                    <span class="my-menu-label">基本信息</span>
                    <span class="material-symbols-outlined my-menu-chevron" aria-hidden="true">chevron_right</span>
                </a>
                <a href="{% url 'bookstore:account_wallet' %}" class="my-menu-item">
                    <span class="material-symbols-outlined my-menu-icon" aria-hidden="true">account_balance_wallet</span>
                    <span class="my-menu-label">账户</span>
                    <span class="material-symbols-outlined my-menu-chevron" aria-hidden="true">chevron_right</span>
                </a>
                <a href="{% url 'bookstore:favorite_folders' %}" class="my-menu-item">
                    <span class="material-symbols-outlined my-menu-icon" aria-hidden="true">favorite</span>
                    <span class="my-menu-label">收藏夹</span>
                    <span class="material-symbols-outlined my-menu-chevron" aria-hidden="true">chevron_right</span>
                </a>
                <a href="{% url 'bookstore:browse_history' %}" class="my-menu-item">
                    <span class="material-symbols-outlined my-menu-icon" aria-hidden="true">history</span>
                    <span class="my-menu-label">最近浏览</span>
                    <span class="material-symbols-outlined my-menu-chevron" aria-hidden="true">chevron_right</span>
                </a>
            </nav>
        </div>
    </div>
</div>

<style>
.my-menu {
    display: flex;
    flex-direction: column;
}

.my-menu-item {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 1.1rem 1.25rem;
    color: var(--text-primary);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s ease;
}

.my-menu-item:last-child {
    border-bottom: none;
}

.my-menu-item:hover {
    background: var(--secondary-bg);
}

.my-menu-icon {
    font-size: 1.35rem;
    color: var(--text-secondary);
}

.my-menu-label {
    flex: 1;
    font-size: 1.05rem;
    font-weight: 600;
}

.my-menu-chevron {
    font-size: 1.25rem;
    color: var(--text-secondary);
}
</style>
{% endblock %}
