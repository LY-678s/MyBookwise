[pytest]
DJANGO_SETTINGS_MODULE = tests.settings_test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -ra
    --strict-markers
    --tb=short
    --reuse-db
markers =
    slow: 耗时较长的测试
    unit: 单元测试
    path: 独立路径测试
    integration: 集成测试
    payment: 支付相关测试
    boundary: 边界值测试
    equivalence: 等价类测试
    scenario: 场景法测试
    credit: 信用相关测试
