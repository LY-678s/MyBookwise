name: mybookwise

services:
  db:
    image: mysql:8.0
    container_name: mybookwise-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-yl15924}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bookstoredb}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../SetDatabase/bookstoredb.sql:/docker-entrypoint-initdb.d/01-bookstoredb.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-yl15924}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      pull: false
    container_name: mybookwise-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-docker-demo-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost,0.0.0.0,mybookwise.xyz,www.mybookwise.xyz,ly.mybookwise.xyz,.trycloudflare.com}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000,https://mybookwise.xyz,https://www.mybookwise.xyz,https://ly.mybookwise.xyz}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bookstoredb}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-yl15924}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-25}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    ports:
      - "8000:8000"

volumes:
  mysql_data:
